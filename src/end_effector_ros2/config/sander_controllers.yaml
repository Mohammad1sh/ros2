# ign_ros2_control plugin'ine verilen controller_manager yapılandırması.
# Plugin /gz namespace'inde çalıştığı için "/**" jokeri kullanılır.
/**:
  controller_manager:
    ros__parameters:
      update_rate: 100  # Hz

      joint_state_broadcaster:
        type: joint_state_broadcaster/JointStateBroadcaster

      dsr_position_controller:
        type: forward_command_controller/ForwardCommandController

      zimpara_velocity_controller:
        type: velocity_controllers/JointGroupVelocityController

  # gazebo_bridge 7 değer gönderir: joint_1..6 + servo_joint (kamera kapağı)
  dsr_position_controller:
    ros__parameters:
      joints:
        - joint_1
        - joint_2
        - joint_3
        - joint_4
        - joint_5
        - joint_6
        - servo_joint
      interface_name: position

  zimpara_velocity_controller:
    ros__parameters:
      joints:
        - sander_spin_joint

  # gz_ros2_control eklem pozisyon takip kazancı (varsayılan 0.1 çok yavaştı)
  gz_ros2_control:
    ros__parameters:
      position_proportional_gain: 2.5
